<!-- =====================
Checkout
===================== -->

<section class="checkout">

<div class="container">

<div class="checkout-grid">

<!-- Billing -->

<div class="checkout-form">

<h2>

Billing Details

</h2>

<form id="checkoutForm">

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Mobile Number"
required>

<input
type="text"
placeholder="Street Address"
required>

<input
type="text"
placeholder="City"
required>

<input
type="text"
placeholder="State"
required>

<input
type="text"
placeholder="PIN Code"
required>

<h3>

Payment Method

</h3>

<label>

<input
type="radio"
name="payment"
checked>

UPI

</label>

<label>

<input
type="radio"
name="payment">

Credit Card

</label>

<label>

<input
type="radio"
name="payment">

Debit Card

</label>

<label>

<input
type="radio"
name="payment">

Net Banking

</label>

<label>

<input
type="radio"
name="payment">

Cash on Delivery

</label>

<button
type="submit"
class="btn">

Place Order

</button>

</form>

</div>

<!-- Summary -->

<div class="order-summary">

<h2>

Order Summary

</h2>

<div id="checkoutItems">

Loading...

</div>

<hr>

<div class="summary-row">

<span>Total</span>

<strong
id="checkoutTotal">

₹0

</strong>

</div>

</div>

</div>
