<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Order Successful | BatMaster Pro</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar">

<div class="container">

<a href="index.html" class="logo">

BatMaster <span>Pro</span>

</a>

</div>

</nav>

<section class="success-page">

<div class="container">

<div class="success-card">

<div class="success-icon">

<i class="fa-solid fa-circle-check"></i>

</div>

<h1>

Thank You!

</h1>

<p>

Your order has been placed successfully.

</p>

<div class="order-box">

<p>

<strong>Order Number:</strong>

<span id="orderNumber"></span>

</p>

<p>

<strong>Estimated Delivery:</strong>

<span id="deliveryDate"></span>

</p>

</div>

<div class="success-buttons">

<a href="shop.html"
class="btn">

Continue Shopping

</a>

<button
class="btn-outline"
onclick="window.print()">

Download Invoice

</button>

</div>

</div>

</div>

</section>

<footer>

<div class="container">

<p>

© 2026 BatMaster Pro.
All Rights Reserved.

</p>

</div>

</footer>

<script>

const order =
"BM" +
Math.floor(
100000 +
Math.random()*900000
);

document
.getElementById("orderNumber")
.textContent = order;

const date = new Date();

date.setDate(
date.getDate()+5
);

document
.getElementById("deliveryDate")
.textContent =
date.toDateString();

</script>

</body>

</html>
