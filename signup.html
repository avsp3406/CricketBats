<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | BatMaster Pro</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navigation -->

<nav class="navbar">

<div class="container">

<a href="index.html" class="logo">

BatMaster <span>Pro</span>

</a>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</div>

</nav>

<!-- Signup -->

<section class="auth-section">

<div class="auth-box">

<h1>

Create Account

</h1>

<p>

Join BatMaster Pro and start shopping.

</p>

<form id="signupForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter Full Name"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Create Password"
required
minlength="6">

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<label style="display:flex;align-items:center;gap:10px;margin-bottom:25px;">

<input
type="checkbox"
required>

I agree to the

<a href="terms.html">

Terms & Conditions

</a>

</label>

<button
type="submit"
class="btn">

Create Account

</button>

</form>

<p class="auth-link">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</section>

<footer>

<div class="container">

<p>

© 2026 BatMaster Pro. All Rights Reserved.

</p>

</div>

</footer>

<script>

const form =
document.getElementById("signupForm");

form.addEventListener("submit",function(e){

e.preventDefault();

const password =
document.getElementById("password").value;

const confirm =
document.getElementById("confirmPassword").value;

if(password!==confirm){

alert("Passwords do not match.");

return;

}

const user={

name:document.getElementById("name").value,

email:document.getElementById("email").value,

password:password

};

localStorage.setItem(
"batmasterUser",
JSON.stringify(user)
);

alert("Account created successfully!");

window.location.href="login.html";

});

</script>

</body>

</html>
